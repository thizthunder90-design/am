<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exambro Local Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen" class="container-center">
        <div class="card-panel">
            <h1>Exambro HD</h1>
            <p>Sistem Ujian Terintegrasi</p>
            
            <div class="input-group">
                <label>NAMA LENGKAP</label>
                <input type="text" id="inNama" placeholder="Nama Siswa...">
            </div>

            <div class="input-group">
                <label>TOKEN UJIAN</label>
                <input type="text" id="inToken" placeholder="Masukkan Token...">
            </div>

            <div class="input-group">
                <label>MATA PELAJARAN</label>
                <select id="selectMapel" class="custom-select">
    <option value="" disabled selected>-- Pilih Mapel --</option>
    <option value="ekonomi">📖 Ekonomi</option>
    <option value="matematika">📐 Matematika</option>
</select>
            </div>

            <button class="btn-utama" onclick="validasiDanMulai()">MULAI UJIAN</button>
        </div>
    </div>

    <div id="examArea" style="display: none;">
        <header>
            <div class="info-siswa">
                <b id="outNama">-</b>
                <span id="outMapel">-</span>
            </div>
            <div class="timer">01:00:00</div>
        </header>
        <div class="content-soal" id="boxSoal"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
