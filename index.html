<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Ujian HD - Text Mode</title>
    <style>
        :root {
            --primary: #2563eb; --dark: #0f172a; --bg-card: #1e293b;
            --text-main: #f8fafc; --text-dim: #94a3b8; --danger: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); color: var(--text-main); 
            height: 100vh; overflow: hidden; 
        }

        /* Layar Login */
        .setup-screen {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; padding: 20px; text-align: center;
        }

        .card {
            background: var(--bg-card); padding: 30px; border-radius: 20px;
            width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid #334155; background: #0f172a; color: white;
        }

        button {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            background: var(--primary); color: white; font-weight: bold; cursor: pointer;
        }

        /* Area Ujian */
        #examArea { display: none; flex-direction: column; height: 100vh; }
        
        header {
            background: var(--bg-card); padding: 15px; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }

        .question-list {
            flex: 1; overflow-y: auto; padding: 20px; background: #0a0f1d;
        }

        .q-card {
            background: var(--bg-card); padding: 20px; border-radius: 12px;
            margin-bottom: 25px; border-left: 5px solid var(--primary);
        }

        .opt-label {
            display: flex; align-items: center; gap: 12px; background: #0f172a;
            padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid #334155;
        }

        .opt-label input { width: auto; margin: 0; }

        .footer-action { padding: 20px; background: var(--bg-card); }
    </style>
</head>
<body>

    <div id="setupScreen" class="setup-screen">
        <div class="card">
            <h2 style="color: #60a5fa; margin-bottom: 10px;">Ujian Digital HD</h2>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">Silakan isi data dan link soal</p>
            
            <input type="text" id="userName" placeholder="Nama Lengkap Siswa">
            <input type="text" id="subjectName" placeholder="Nama Mata Pelajaran">
            <input type="text" id="jsonUrl" placeholder="Link Raw JSON GitHub">
            
            <button onclick="startExam()">Mulai Ujian Sekarang</button>
        </div>
    </div>

    <div id="examArea">
        <header>
            <div>
                <div id="dispName" style="font-weight: bold; font-size: 0.9rem;">-</div>
                <div id="dispSubject" style="font-size: 0.7rem; color: var(--text-dim);">MAPEL: -</div>
            </div>
            <div id="timer" style="font-family: monospace; color: #fbbf24; font-weight: bold;">01:00:00</div>
        </header>

        <div class="question-list" id="listSoal">
            </div>

        <div class="footer-action">
            <button onclick="finishExam()" style="background: var(--danger);">Selesai & Kumpulkan</button>
        </div>
    </div>

    <script>
        let dataSoal = [];
        let jawabanSiswa = {};

        async function startExam() {
            const url = document.getElementById('jsonUrl').value;
            const nama = document.getElementById('userName').value;
            const mapel = document.getElementById('subjectName').value;

            if(!url || !nama || !mapel) return alert("Semua kolom harus diisi!");

            try {
                const response = await fetch(url);
                dataSoal = await response.json();
                
                renderSoal();
                
                document.getElementById('setupScreen').style.display = 'none';
                document.getElementById('examArea').style.display = 'flex';
                document.getElementById('dispName').innerText = nama;
                document.getElementById('dispSubject').innerText = "MAPEL: " + mapel.toUpperCase();
                
                // Masuk Fullscreen otomatis
                document.documentElement.requestFullscreen().catch(()=>{});
            } catch (e) {
                alert("Gagal mengambil soal! Periksa link Raw GitHub Anda.");
            }
        }

        function renderSoal() {
            const container = document.getElementById('listSoal');
            const alphabet = ['A', 'B', 'C', 'D', 'E'];
            let html = '';

            dataSoal.forEach((soal, i) => {
                html += `
                <div class="q-card">
                    <p style="margin-bottom: 15px;"><b>${i + 1}.</b> ${soal.q}</p>
                    <div class="options">
                        ${soal.a.map((opsi, idx) => `
                            <label class="opt-label">
                                <input type="radio" name="q${i}" onclick="save(${i}, '${alphabet[idx]}')">
                                <span><b>${alphabet[idx]}.</b> ${opsi}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function save(soalIdx, huruf) {
            jawabanSiswa[soalIdx + 1] = huruf;
            console.log("Update Jawaban:", jawabanSiswa);
        }

        function finishExam() {
            if(confirm("Apakah Anda yakin ingin mengakhiri ujian?")) {
                let hasil = "REKAP JAWABAN\n";
                hasil += "Nama: " + document.getElementById('userName').value + "\n";
                hasil += "Mapel: " + document.getElementById('subjectName').value + "\n\n";
                
                for(let i=1; i<=dataSoal.length; i++) {
                    hasil += i + ":" + (jawabanSiswa[i] || "-") + ", ";
                }
                
                alert("Ujian Selesai!\n\n" + hasil);
                location.reload();
            }
        }
    </script>
</body>
</html>
